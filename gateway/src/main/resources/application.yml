server:
  port: 8084

spring:
  application:
    name: api-gateway
  # do not import remote config during local development to avoid overriding these local routes
  # config:
  #   import: optional:configserver:http://localhost:8888

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/recommendations/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,gateway
  endpoint:
    gateway:
      enabled: true

